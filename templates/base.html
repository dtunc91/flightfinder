<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}GetMeOutOfHere.Live{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Find the cheapest places to fly from your airport — no destination needed.{% endblock %}">
  <meta name="google-site-verification" content="D7SPk9eeETSx8-YyaDxrnSkVB7tn6kpBQffDLpUrR0s" />
  <link rel="canonical" href="{{ request.url }}" />
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">

  <!-- Open Graph -->
  <meta property="og:type" content="{% block og_type %}website{% endblock %}" />
  <meta property="og:site_name" content="GetMeOutOfHere.Live" />
  <meta property="og:title" content="{% block og_title %}GetMeOutOfHere.Live{% endblock %}" />
  <meta property="og:description" content="{% block og_description %}Find the cheapest places to fly from your airport — no destination needed.{% endblock %}" />
  <meta property="og:url" content="{{ request.url }}" />
  <meta property="og:image" content="{% block og_image %}https://getmeoutofhere.live/static/og-image.webp{% endblock %}" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="{% block twitter_title %}GetMeOutOfHere.Live{% endblock %}" />
  <meta name="twitter:description" content="{% block twitter_description %}Find the cheapest places to fly from your airport — no destination needed.{% endblock %}" />
  <meta name="twitter:image" content="{% block twitter_image %}https://getmeoutofhere.live/static/og-image.webp{% endblock %}" />

  {% block extra_head %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "GetMeOutOfHere.Live",
    "url": "https://getmeoutofhere.live",
    "description": "Find the cheapest places to fly from your airport — search by origin, no destination needed.",
    "potentialAction": {
      "@type": "SearchAction",
      "target": {
        "@type": "EntryPoint",
        "urlTemplate": "https://getmeoutofhere.live/?origin={search_term_string}"
      },
      "query-input": "required name=search_term_string"
    }
  }
  </script>
  {% endblock %}
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="{{ url_for('static', filename='index.css') }}" rel="stylesheet" />
  <script src="{{ url_for('static', filename='fontawesome-free-6.7.2-web/js/all.js') }}"></script>
  <script defer data-domain="getmeoutofhere.live" src="https://plausible.io/js/script.js"></script>
  <style>
    body{color:#1a1a2e;background:#f8f9fc;}
    .top-nav a{ color:#2563eb; text-decoration:none; font-weight:600 }
    .top-nav a:hover{ color:#1d4ed8; text-decoration:underline }
    .container-narrow{max-width:900px}
    footer{opacity:.85}
  </style>
</head>
<body>
  <nav class="container d-flex justify-content-between align-items-center py-3 top-nav">
    <div class="d-flex align-items-center gap-2">
      <a href="{{ url_for('index') }}" class="fs-5 fw-bold text-decoration-none text-dark">GetMeOutOfHere<span class="text-primary">.Live</span></a>
      <i class="fa fa-plane ms-1" style="font-size:18px; opacity:.8"></i>
    </div>
    <div class="d-flex gap-3">
      <a href="{{ url_for('about') }}">About</a>
      <a href="{{ url_for('blog_index') }}">Blog</a>
      <a href="{{ url_for('faq') }}">FAQ</a>
      <a href="{{ url_for('privacy') }}">Privacy</a>
      <a href="{{ url_for('terms') }}">Terms</a>
      <a href="mailto:hello@getmeoutofhere.live">Contact</a>
    </div>
  </nav>

  <main class="container container-narrow py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="container py-4 text-center" style="color:#6b7280;border-top:1px solid rgba(0,0,0,.08);margin-top:2rem">
    © {{ current_year if current_year else 2025 }} GetMeOutOfHere.Live
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
